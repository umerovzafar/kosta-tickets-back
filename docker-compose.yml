# Kosta Legal — backend (gateway + микросервисы + PostgreSQL).
# Переменные: скопируйте .env.example в .env и задайте секреты.
# Запуск: docker compose up -d --build
# Полная пересборка: docker compose build --no-cache && docker compose up -d
# Сброс БД (осторожно): docker compose down -v
#
# Gateway не ждёт healthy у всех микросервисов — иначе один «unhealthy» (например expenses)
# блокирует весь стек в Portainer. Критичны только users_db + auth; остальное — service_started.
# Пока сервис поднимается, API по нему может отдавать 503 — это нормально на старте.

name: kosta-tickets-back

services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-1234}:1234"
    environment:
      - DATABASE_URL=${GATEWAY_DATABASE_URL:-postgresql://gateway:gateway@users_db:5432/kosta_users}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://localhost:1234}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - TICKETS_SERVICE_URL=${TICKETS_SERVICE_URL:-http://tickets:1235}
      - NOTIFICATIONS_SERVICE_URL=${NOTIFICATIONS_SERVICE_URL:-http://notifications:1237}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory:1238}
      - TODOS_SERVICE_URL=${TODOS_SERVICE_URL:-http://todos:1240}
      - TIME_TRACKING_SERVICE_URL=${TIME_TRACKING_SERVICE_URL:-http://time_tracking:1241}
      - EXPENSES_SERVICE_URL=${EXPENSES_SERVICE_URL:-http://expenses:1242}
      - PROJECTS_SERVICE_URL=${PROJECTS_SERVICE_URL:-http://projects:1243}
      - ATTENDANCE_SERVICE_URL=${ATTENDANCE_SERVICE_URL:-http://attendance:1239}
      - VACATION_SERVICE_URL=${VACATION_SERVICE_URL:-http://vacation:1244}
      - ATTENDANCE_HIKVISION_ALLOWED_IPS=${ATTENDANCE_HIKVISION_ALLOWED_IPS:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:8080}
      # Широкий CORS по частным IP (RFC1918) — по умолчанию true для LAN/dev; в проде в .env задайте false.
      - CORS_ALLOW_PRIVATE_NETWORK=${CORS_ALLOW_PRIVATE_NETWORK:-true}
      # Одинаковый секрет на gateway, tickets, notifications — защита внутренних WS от обхода gateway.
      - WS_INTERNAL_SECRET=${WS_INTERNAL_SECRET:-}
      # Как у auth — проверка OAuth state на /api/v1/auth/azure/callback (вход в основной фронт и админку).
      # Пустой JWT_SECRET в Portainer ломает auth и весь стек; min 32 символа — см. auth validate_production_secrets
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or stack env (openssl rand -hex 32; same on gateway and auth)}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - AUTH_SET_SESSION_COOKIE=${AUTH_SET_SESSION_COOKIE:-true}
      - AUTH_SESSION_COOKIE_NAME=${AUTH_SESSION_COOKIE_NAME:-kl_access_token}
      - AUTH_SESSION_COOKIE_SECURE=${AUTH_SESSION_COOKIE_SECURE:-true}
      - AUTH_SESSION_COOKIE_SAMESITE=${AUTH_SESSION_COOKIE_SAMESITE:-lax}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1234/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      users_db:
        condition: service_healthy
      auth:
        condition: service_healthy
      tickets:
        condition: service_started
      notifications:
        condition: service_started
      inventory:
        condition: service_started
      todos:
        condition: service_started
      time_tracking:
        condition: service_started
      expenses:
        condition: service_started
      projects:
        condition: service_started
      attendance:
        condition: service_started
      vacation:
        condition: service_started

  users_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${USERS_DB_USER:-gateway}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD:-gateway}
      POSTGRES_DB: ${USERS_DB_NAME:-kosta_users}
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  tickets:
    build:
      context: .
      dockerfile: tickets/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TICKETS_DATABASE_URL:-postgresql://tickets:tickets@tickets_db:5432/kosta_tickets}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - WS_INTERNAL_SECRET=${WS_INTERNAL_SECRET:-}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1235/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      tickets_db:
        condition: service_healthy

  tickets_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TICKETS_DB_USER:-tickets}
      POSTGRES_PASSWORD: ${TICKETS_DB_PASSWORD:-tickets}
      POSTGRES_DB: ${TICKETS_DB_NAME:-kosta_tickets}
    volumes:
      - tickets_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://gateway:gateway@users_db:5432/kosta_users}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AUTH_REDIRECT_URI=${AZURE_REDIRECT_URI}
      # Пустой JWT_SECRET в Portainer ломает auth и весь стек; min 32 символа — см. auth validate_production_secrets
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or stack env (openssl rand -hex 32; same on gateway and auth)}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - AUTH_SET_SESSION_COOKIE=${AUTH_SET_SESSION_COOKIE:-true}
      - AUTH_SESSION_COOKIE_NAME=${AUTH_SESSION_COOKIE_NAME:-kl_access_token}
      - AUTH_SESSION_COOKIE_SECURE=${AUTH_SESSION_COOKIE_SECURE:-true}
      - AUTH_SESSION_COOKIE_SAMESITE=${AUTH_SESSION_COOKIE_SAMESITE:-lax}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:8080}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # Временный пароль для первого входа, если в .env не задан ADMIN_PASSWORD.
      # В production задайте в .env свой пароль; после admin-bootstrap пароль берётся из БД.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_BOOTSTRAP_SECRET=${ADMIN_BOOTSTRAP_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1236/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      # Swarm/Portainer: auth ждёт БД в lifespan до ~60 с; медленный диск — запас по health.
      start_period: 90s
    depends_on:
      users_db:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    restart: unless-stopped
    # Занят 8080? Задайте в .env: ADMIN_PANEL_PORT=8081
    ports:
      - "${ADMIN_PANEL_PORT:-8080}:80"

  notifications:
    build:
      context: .
      dockerfile: notifications/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${NOTIFICATIONS_DATABASE_URL:-postgresql://notifications:notifications@notifications_db:5432/kosta_notifications}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - WS_INTERNAL_SECRET=${WS_INTERNAL_SECRET:-}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1237/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      notifications_db:
        condition: service_healthy

  notifications_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${NOTIFICATIONS_DB_USER:-notifications}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD:-notifications}
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME:-kosta_notifications}
    volumes:
      - notifications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory:
    build:
      context: .
      dockerfile: inventory/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${INVENTORY_DATABASE_URL:-postgresql://inventory:inventory@inventory_db:5432/kosta_inventory}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1238/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      inventory_db:
        condition: service_healthy

  inventory_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${INVENTORY_DB_USER:-inventory}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory}
      POSTGRES_DB: ${INVENTORY_DB_NAME:-kosta_inventory}
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  attendance:
    build:
      context: .
      dockerfile: attendance/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${ATTENDANCE_DATABASE_URL:-postgresql://attendance:attendance@attendance_db:5432/kosta_attendance}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - HIKVISION_DEVICE_IP=${HIKVISION_DEVICE_IP:-}
      - HIKVISION_DEVICE_IPS=${HIKVISION_DEVICE_IPS:-}
      - HIKVISION_DEVICE_PORT=${HIKVISION_DEVICE_PORT:-80}
      - HIKVISION_DEVICE_USER=${HIKVISION_DEVICE_USER:-admin}
      - HIKVISION_DEVICE_PASSWORD=${HIKVISION_DEVICE_PASSWORD:-}
      - HIKVISION_REQUEST_TIMEOUT=${HIKVISION_REQUEST_TIMEOUT:-60}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1239/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      attendance_db:
        condition: service_healthy

  attendance_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${ATTENDANCE_DB_USER:-attendance}
      POSTGRES_PASSWORD: ${ATTENDANCE_DB_PASSWORD:-attendance}
      POSTGRES_DB: ${ATTENDANCE_DB_NAME:-kosta_attendance}
    volumes:
      - attendance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  todos:
    build:
      context: .
      dockerfile: todos/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TODOS_DATABASE_URL:-postgresql://todos:todos@todos_db:5432/kosta_todos}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-15}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-http://localhost:1234/api/v1/todos/calendar/callback}
      - CALENDAR_CONNECTED_REDIRECT_URL=${CALENDAR_CONNECTED_REDIRECT_URL:-http://localhost:5173}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1240/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - media_storage:/app/media
    depends_on:
      todos_db:
        condition: service_healthy
      auth:
        condition: service_healthy

  todos_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TODOS_DB_USER:-todos}
      POSTGRES_PASSWORD: ${TODOS_DB_PASSWORD:-todos}
      POSTGRES_DB: ${TODOS_DB_NAME:-kosta_todos}
    volumes:
      - todos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  time_tracking:
    build:
      context: .
      dockerfile: time_tracking/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TIME_TRACKING_DATABASE_URL:-postgresql://time_tracking:time_tracking@time_tracking_db:5432/kosta_time_tracking}
      - EXPENSES_SERVICE_URL=${EXPENSES_SERVICE_URL:-http://expenses:1242}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1241/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      time_tracking_db:
        condition: service_healthy

  time_tracking_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TIME_TRACKING_DB_USER:-time_tracking}
      POSTGRES_PASSWORD: ${TIME_TRACKING_DB_PASSWORD:-time_tracking}
      POSTGRES_DB: ${TIME_TRACKING_DB_NAME:-kosta_time_tracking}
    volumes:
      - time_tracking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # В Docker Swarm / Portainer stacks depends_on не соблюдается — приложение само ждёт БД при старте.
  expenses:
    build:
      context: .
      dockerfile: expenses/Dockerfile
    restart: unless-stopped
    environment:
      # Без env_file: в Portainer нет файла /data/compose/.../.env — переменные задаются в UI стека или через .env при локальном compose.
      # Локально: docker compose подставляет ${VAR} из .env в каталоге проекта.
      - DATABASE_URL=${EXPENSES_DATABASE_URL:-postgresql://expenses:expenses@expenses_db:5432/kosta_expenses}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - TIME_TRACKING_SERVICE_URL=${TIME_TRACKING_SERVICE_URL:-http://time_tracking:1241}
      - EXPENSE_AMOUNT_LIMIT_UZS=${EXPENSE_AMOUNT_LIMIT_UZS:-}
      - LOG_LEVEL=${EXPENSES_LOG_LEVEL:-info}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - EXPENSE_ALLOW_SELF_MODERATION=${EXPENSE_ALLOW_SELF_MODERATION:-true}
      - EXPENSE_NOTIFY_ON_SUBMIT=${EXPENSE_NOTIFY_ON_SUBMIT:-true}
      - EXPENSE_NOTIFY_TO=${EXPENSE_NOTIFY_TO:-zumerov@kostalegal.com}
      - EXPENSE_NOTIFY_ROUTING_JSON=${EXPENSE_NOTIFY_ROUTING_JSON:-}
      - EXPENSE_SMTP_HOST=${EXPENSE_SMTP_HOST:-}
      - EXPENSE_SMTP_PORT=${EXPENSE_SMTP_PORT:-587}
      - EXPENSE_SMTP_USER=${EXPENSE_SMTP_USER:-}
      - EXPENSE_SMTP_PASSWORD=${EXPENSE_SMTP_PASSWORD:-}
      - EXPENSE_SMTP_USE_TLS=${EXPENSE_SMTP_USE_TLS:-true}
      - EXPENSE_MAIL_FROM=${EXPENSE_MAIL_FROM:-}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://localhost:1234}
      - EXPENSE_EMAIL_ACTION_SECRET=${EXPENSE_EMAIL_ACTION_SECRET:-}
      - EXPENSE_EMAIL_ACTION_TTL_SECONDS=${EXPENSE_EMAIL_ACTION_TTL_SECONDS:-604800}
      - EXPENSE_EMAIL_ACTION_CONFIRM_STEP=${EXPENSE_EMAIL_ACTION_CONFIRM_STEP:-true}
      - EXPENSE_NOTIFY_AUTHOR_ON_DECISION=${EXPENSE_NOTIFY_AUTHOR_ON_DECISION:-true}
      - EXPENSE_AUTH_BEARER_FOR_AUTHOR_EMAIL=${EXPENSE_AUTH_BEARER_FOR_AUTHOR_EMAIL:-}
      - EXPENSE_ALLOW_DATABASE_RESET=${EXPENSE_ALLOW_DATABASE_RESET:-true}
    volumes:
      - media_storage:/app/media
    healthcheck:
      # HTTP 200 даже если БД ещё не отвечает (тело: status=degraded) — см. expenses/presentation/routes/health.py
      test: ["CMD-SHELL", "curl -sf http://localhost:1242/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    depends_on:
      expenses_db:
        condition: service_healthy

  expenses_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${EXPENSES_DB_USER:-expenses}
      POSTGRES_PASSWORD: ${EXPENSES_DB_PASSWORD:-expenses}
      POSTGRES_DB: ${EXPENSES_DB_NAME:-kosta_expenses}
    volumes:
      - expenses_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Общий справочник проектов (БД kosta_projects по умолчанию).
  projects_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${PROJECTS_DB_USER:-projects}
      POSTGRES_PASSWORD: ${PROJECTS_DB_PASSWORD:-projects}
      POSTGRES_DB: ${PROJECTS_DB_NAME:-kosta_projects}
    volumes:
      - projects_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  projects:
    build:
      context: .
      dockerfile: projects/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${PROJECTS_DATABASE_URL:-postgresql://projects:projects@projects_db:5432/kosta_projects}
    depends_on:
      projects_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1243/health\", timeout=3)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  vacation:
    build:
      context: .
      dockerfile: vacation/Dockerfile
    restart: unless-stopped
    environment:
      # Все VACATION_DB_* из .env / Portainer (= POSTGRES_* у vacation_db). HOST/PORT не зашивать: внешняя БД — свой хост.
      # Явный URL: VACATION_USE_EXPLICIT_DATABASE_URL=true и VACATION_DATABASE_URL=...
      - VACATION_USE_EXPLICIT_DATABASE_URL=${VACATION_USE_EXPLICIT_DATABASE_URL:-false}
      - VACATION_DB_USER=${VACATION_DB_USER:-vacation}
      - VACATION_DB_PASSWORD=${VACATION_DB_PASSWORD:-vacation}
      - VACATION_DB_NAME=${VACATION_DB_NAME:-kosta_vacation}
      - VACATION_DB_HOST=${VACATION_DB_HOST:-vacation_db}
      - VACATION_DB_PORT=${VACATION_DB_PORT:-5432}
    # Пока lifespan ждёт БД (до ~60 с), uvicorn не принимает TCP — иначе healthcheck ловит Connection refused.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1244/health\", timeout=5)"',
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 120s
    depends_on:
      vacation_db:
        condition: service_healthy

  vacation_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${VACATION_DB_USER:-vacation}
      POSTGRES_PASSWORD: ${VACATION_DB_PASSWORD:-vacation}
      POSTGRES_DB: ${VACATION_DB_NAME:-kosta_vacation}
    volumes:
      - vacation_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  telegram_bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
