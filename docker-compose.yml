# Kosta Legal — backend (gateway + микросервисы + PostgreSQL).
# Переменные: скопируйте .env.example в .env и задайте секреты.
# Запуск: docker compose up -d --build
# Полная пересборка: docker compose build --no-cache && docker compose up -d
# Сброс БД (осторожно): docker compose down -v
#
# Gateway не ждёт healthy у всех микросервисов — иначе один «unhealthy» (например expenses)
# блокирует весь стек в Portainer. Критичны только users_db + auth; остальное — service_started.
# Пока сервис поднимается, API по нему может отдавать 503 — это нормально на старте.

name: kosta-tickets-back

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-1234}:1234"
    environment:
      - DATABASE_URL=${GATEWAY_DATABASE_URL:-postgresql://gateway:gateway@users_db:5432/kosta_users}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://localhost:1234}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - TICKETS_SERVICE_URL=${TICKETS_SERVICE_URL:-http://tickets:1235}
      - NOTIFICATIONS_SERVICE_URL=${NOTIFICATIONS_SERVICE_URL:-http://notifications:1237}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory:1238}
      - TODOS_SERVICE_URL=${TODOS_SERVICE_URL:-http://todos:1240}
      - TIME_TRACKING_SERVICE_URL=${TIME_TRACKING_SERVICE_URL:-http://time_tracking:1241}
      - EXPENSES_SERVICE_URL=${EXPENSES_SERVICE_URL:-http://expenses:1242}
      - ATTENDANCE_SERVICE_URL=${ATTENDANCE_SERVICE_URL:-http://attendance:1239}
      - ATTENDANCE_HIKVISION_ALLOWED_IPS=${ATTENDANCE_HIKVISION_ALLOWED_IPS:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:8080}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1234/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      users_db:
        condition: service_healthy
      auth:
        condition: service_healthy
      tickets:
        condition: service_started
      notifications:
        condition: service_started
      inventory:
        condition: service_started
      todos:
        condition: service_started
      time_tracking:
        condition: service_started
      expenses:
        condition: service_started
      attendance:
        condition: service_started

  users_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${USERS_DB_USER:-gateway}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD:-gateway}
      POSTGRES_DB: ${USERS_DB_NAME:-kosta_users}
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  tickets:
    build:
      context: ./tickets
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TICKETS_DATABASE_URL:-postgresql://tickets:tickets@tickets_db:5432/kosta_tickets}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1235/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      tickets_db:
        condition: service_healthy

  tickets_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TICKETS_DB_USER:-tickets}
      POSTGRES_PASSWORD: ${TICKETS_DB_PASSWORD:-tickets}
      POSTGRES_DB: ${TICKETS_DB_NAME:-kosta_tickets}
    volumes:
      - tickets_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://gateway:gateway@users_db:5432/kosta_users}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AUTH_REDIRECT_URI=${AZURE_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-10080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:8080}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_BOOTSTRAP_SECRET=${ADMIN_BOOTSTRAP_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1236/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      users_db:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    restart: unless-stopped
    # Занят 8080? Задайте в .env: ADMIN_PANEL_PORT=8081
    ports:
      - "${ADMIN_PANEL_PORT:-8080}:80"

  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${NOTIFICATIONS_DATABASE_URL:-postgresql://notifications:notifications@notifications_db:5432/kosta_notifications}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1237/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      notifications_db:
        condition: service_healthy

  notifications_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${NOTIFICATIONS_DB_USER:-notifications}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD:-notifications}
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME:-kosta_notifications}
    volumes:
      - notifications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory:
    build:
      context: ./inventory
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${INVENTORY_DATABASE_URL:-postgresql://inventory:inventory@inventory_db:5432/kosta_inventory}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1238/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      inventory_db:
        condition: service_healthy

  inventory_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${INVENTORY_DB_USER:-inventory}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory}
      POSTGRES_DB: ${INVENTORY_DB_NAME:-kosta_inventory}
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  attendance:
    build:
      context: ./attendance
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${ATTENDANCE_DATABASE_URL:-postgresql://attendance:attendance@attendance_db:5432/kosta_attendance}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - HIKVISION_DEVICE_IP=${HIKVISION_DEVICE_IP:-}
      - HIKVISION_DEVICE_IPS=${HIKVISION_DEVICE_IPS:-}
      - HIKVISION_DEVICE_PORT=${HIKVISION_DEVICE_PORT:-80}
      - HIKVISION_DEVICE_USER=${HIKVISION_DEVICE_USER:-admin}
      - HIKVISION_DEVICE_PASSWORD=${HIKVISION_DEVICE_PASSWORD:-}
      - HIKVISION_REQUEST_TIMEOUT=${HIKVISION_REQUEST_TIMEOUT:-60}
    volumes:
      - media_storage:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1239/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      attendance_db:
        condition: service_healthy

  attendance_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${ATTENDANCE_DB_USER:-attendance}
      POSTGRES_PASSWORD: ${ATTENDANCE_DB_PASSWORD:-attendance}
      POSTGRES_DB: ${ATTENDANCE_DB_NAME:-kosta_attendance}
    volumes:
      - attendance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  todos:
    build:
      context: ./todos
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TODOS_DATABASE_URL:-postgresql://todos:todos@todos_db:5432/kosta_todos}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-http://localhost:1234/api/v1/todos/calendar/callback}
      - CALENDAR_CONNECTED_REDIRECT_URL=${CALENDAR_CONNECTED_REDIRECT_URL:-http://localhost:5173}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1240/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      todos_db:
        condition: service_healthy
      auth:
        condition: service_healthy

  todos_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TODOS_DB_USER:-todos}
      POSTGRES_PASSWORD: ${TODOS_DB_PASSWORD:-todos}
      POSTGRES_DB: ${TODOS_DB_NAME:-kosta_todos}
    volumes:
      - todos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  time_tracking:
    build:
      context: ./time_tracking
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TIME_TRACKING_DATABASE_URL:-postgresql://time_tracking:time_tracking@time_tracking_db:5432/kosta_time_tracking}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1241/health\", timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      time_tracking_db:
        condition: service_healthy

  time_tracking_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${TIME_TRACKING_DB_USER:-time_tracking}
      POSTGRES_PASSWORD: ${TIME_TRACKING_DB_PASSWORD:-time_tracking}
      POSTGRES_DB: ${TIME_TRACKING_DB_NAME:-kosta_time_tracking}
    volumes:
      - time_tracking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  expenses:
    build:
      context: ./expenses
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${EXPENSES_DATABASE_URL:-postgresql://expenses:expenses@expenses_db:5432/kosta_expenses}
      - MEDIA_PATH=${MEDIA_PATH:-/app/media}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:1236}
      - EXPENSE_AMOUNT_LIMIT_UZS=${EXPENSE_AMOUNT_LIMIT_UZS:-}
      - LOG_LEVEL=${EXPENSES_LOG_LEVEL:-info}
    volumes:
      - media_storage:/app/media
    healthcheck:
      # HTTP 200 даже если БД ещё не отвечает (тело: status=degraded) — см. expenses/presentation/routes/health.py
      test: ["CMD-SHELL", "curl -sf http://localhost:1242/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    depends_on:
      expenses_db:
        condition: service_healthy

  expenses_db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: ${EXPENSES_DB_USER:-expenses}
      POSTGRES_PASSWORD: ${EXPENSES_DB_PASSWORD:-expenses}
      POSTGRES_DB: ${EXPENSES_DB_NAME:-kosta_expenses}
    volumes:
      - expenses_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1242/health\", timeout=3)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  media_storage:
  users_db_data:
  tickets_db_data:
  notifications_db_data:
  inventory_db_data:
  attendance_db_data:
  todos_db_data:
  time_tracking_db_data:
  expenses_db_data:
