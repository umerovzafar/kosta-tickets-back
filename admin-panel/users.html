<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Users</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-dot"></div>
      <div>
        <h1>Kosta Admin Dashboard</h1>
        <p>Управление ролями пользователей</p>
      </div>
    </div>
    <div class="topbar-actions">
      <a href="#" id="btn-logout">Выход</a>
    </div>
  </header>

  <main class="container app-shell">
    <aside class="sidebar">
      <h3>Навигация</h3>
      <nav id="sidebar-nav"></nav>
    </aside>

    <section class="content">
      <div id="dashboard-error" class="error-msg" style="display:none"></div>
      <section class="card">
        <div class="card-header">
          <div>
            <h2 class="card-title">Пользователи системы</h2>
            <p class="card-subtitle">Выберите роль и сохраните изменения.</p>
          </div>
          <div class="toolbar">
            <input id="users-q" class="input" type="text" placeholder="Поиск по имени или email...">
            <button type="button" class="btn btn-primary" id="btn-users-refresh">Обновить</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="users-table">
            <thead>
              <tr>
                <th>Пользователь</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="4" class="loading">Загрузка…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="users.js"></script>
</body>
</html>
